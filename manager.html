<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Expenses Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── Cards ── */
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 20px 24px; margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: #8892a4; margin-bottom: 14px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.875rem; font-weight: 600;
      transition: background .15s, transform .1s; white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary   { background: #4f46e5; color: #fff; }
    .btn-primary:hover   { background: #4338ca; }
    .btn-success   { background: #059669; color: #fff; }
    .btn-success:hover   { background: #047857; }
    .btn-neutral   { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .btn-neutral:hover   { background: #e9eaf0; }
    .btn-danger    { background: #ef4444; color: #fff; }
    .btn-danger:hover    { background: #dc2626; }
    .btn-ghost     { background: transparent; color: #6b7280; border: 1px solid #e5e7eb; }
    .btn-ghost:hover     { background: #f9fafb; }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; border-radius: 6px; }
    .btn-xs { padding: 3px 8px; font-size: 0.75rem; border-radius: 5px; }

    /* ── People Section ── */
    .people-wrap { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .person-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #ede9fe; border: 1px solid #c4b5fd;
      color: #5b21b6; border-radius: 20px;
      padding: 4px 8px 4px 12px; font-size: 0.85rem; font-weight: 500;
    }
    .person-chip-remove {
      background: none; border: none; cursor: pointer;
      color: #a78bfa; font-size: 1rem; line-height: 1;
      padding: 0 2px; border-radius: 50%;
      transition: color .15s, background .15s;
    }
    .person-chip-remove:hover { color: #5b21b6; background: #c4b5fd; }

    .add-person-form { display: flex; gap: 8px; align-items: center; }
    .add-person-form input {
      border: 1px solid #d1d5db; border-radius: 8px;
      padding: 6px 12px; font-size: 0.875rem; width: 160px;
    }
    .add-person-form input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,.15); }

    /* ── Table Section ── */
    .table-toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
    }
    .table-count { font-size: 0.875rem; color: #6b7280; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      text-align: left; padding: 10px 12px;
      background: #f9fafb; border-bottom: 2px solid #e5e7eb;
      font-weight: 600; color: #374151; white-space: nowrap;
    }
    tbody td {
      padding: 11px 12px; border-bottom: 1px solid #f3f4f6;
      vertical-align: middle; max-width: 220px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f8f8ff; }

    .td-num { font-variant-numeric: tabular-nums; }
    .td-muted { color: #9ca3af; font-size: 0.8rem; }
    .td-debtors { font-size: 0.8rem; color: #6b7280; white-space: normal; max-width: 180px; }

    .actions-cell { display: flex; gap: 6px; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-person { background: #ede9fe; color: #5b21b6; }

    .empty-state {
      text-align: center; padding: 48px 24px; color: #9ca3af;
    }
    .empty-state p { margin-bottom: 16px; font-size: 0.95rem; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff; border-radius: 16px; width: 580px;
      max-width: 100%; max-height: calc(100vh - 40px);
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
      display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 22px 24px 0; position: sticky; top: 0;
      background: #fff; z-index: 1; border-radius: 16px 16px 0 0;
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; }
    .modal-body { padding: 4px 24px 20px; flex: 1; }
    .modal-footer {
      padding: 16px 24px 22px; border-top: 1px solid #f3f4f6;
      display: flex; justify-content: flex-end; gap: 10px;
      position: sticky; bottom: 0; background: #fff;
      border-radius: 0 0 16px 16px;
    }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.span2 { grid-column: 1 / -1; }

    label { font-size: 0.78rem; font-weight: 600; color: #4b5563; text-transform: uppercase; letter-spacing: .04em; }

    input[type="text"],
    input[type="number"],
    select {
      border: 1px solid #d1d5db; border-radius: 8px;
      padding: 8px 11px; font-size: 0.9rem; width: 100%;
      background: #fff; color: #1a1a2e;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none; border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }

    .section-divider {
      border: none; border-top: 1px solid #f3f4f6;
      margin: 18px 0 14px;
    }

    /* ── Owed Rows ── */
    .owed-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .owed-header span { font-size: 0.78rem; font-weight: 600; color: #4b5563; text-transform: uppercase; letter-spacing: .04em; }

    .owed-list { display: flex; flex-direction: column; gap: 8px; }
    .owed-row { display: flex; gap: 8px; align-items: center; }
    .owed-row select { flex: 1; min-width: 0; }
    .owed-row input  { width: 110px; flex-shrink: 0; }
    .owed-row-remove {
      flex-shrink: 0; background: none; border: 1px solid #e5e7eb;
      border-radius: 6px; cursor: pointer; padding: 5px 9px;
      color: #d1d5db; font-size: 0.9rem; line-height: 1;
      transition: color .15s, border-color .15s;
    }
    .owed-row-remove:hover { color: #ef4444; border-color: #ef4444; }

    .owed-empty { font-size: 0.85rem; color: #9ca3af; font-style: italic; padding: 6px 0; }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 300;
      align-items: center; justify-content: center; padding: 20px;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: #fff; border-radius: 12px; padding: 28px;
      width: 380px; max-width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
    }
    .confirm-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .confirm-box p  { font-size: 0.875rem; color: #6b7280; margin-bottom: 20px; }
    .confirm-actions { display: flex; justify-content: flex-end; gap: 10px; }

    /* ── Notification ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 400;
      background: #1a1a2e; color: #fff; border-radius: 10px;
      padding: 12px 20px; font-size: 0.875rem; font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
      opacity: 0; transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <h1>Japan Expenses Manager</h1>
    <div class="header-actions">
      <label class="btn btn-neutral" style="cursor:pointer">
        📂 Load JSON
        <input type="file" accept=".json" id="fileInput" style="display:none" />
      </label>
      <button class="btn btn-success" id="btnSave">💾 Download JSON</button>
    </div>
  </div>

  <!-- People -->
  <div class="card">
    <div class="card-title">People</div>
    <div class="people-wrap" id="peopleList"></div>
    <div style="margin-top: 12px">
      <div class="add-person-form">
        <input type="text" id="newPersonInput" placeholder="Add person…" maxlength="40" />
        <button class="btn btn-neutral btn-sm" id="btnAddPerson">+ Add</button>
      </div>
    </div>
  </div>

  <!-- Transactions -->
  <div class="card">
    <div class="table-toolbar">
      <span class="table-count" id="tableCount">0 expenses</span>
      <button class="btn btn-primary" id="btnAddExpense">+ Add Expense</button>
    </div>
    <div class="table-wrap">
      <table id="expenseTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Paid By</th>
            <th>Date</th>
            <th>Rec Amount</th>
            <th>Act Amount</th>
            <th>Debtors</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expenseBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">
        <p>No expenses loaded.</p>
        <button class="btn btn-neutral" onclick="document.getElementById('fileInput').click()">📂 Load expenses.json</button>
      </div>
    </div>
  </div>

</div><!-- /.page -->

<!-- Edit / Add Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Expense</div>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group span2">
          <label for="fTitle">Title</label>
          <input type="text" id="fTitle" placeholder="Expense title" />
        </div>
        <div class="form-group">
          <label for="fPaidBy">Paid By</label>
          <select id="fPaidBy"></select>
        </div>
        <div class="form-group">
          <label for="fRecAmount">Recorded Amount</label>
          <input type="text" id="fRecAmount" placeholder="e.g. $120.00 or ¥5,000" />
        </div>
        <div class="form-group">
          <label for="fActAmount">Actual Amount (USD)</label>
          <input type="number" id="fActAmount" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label for="fDate">Date</label>
          <input type="text" id="fDate" placeholder="e.g. 1/22/26 or –" />
        </div>
        <div class="form-group span2">
          <label for="fRecordedOn">Recorded On</label>
          <input type="text" id="fRecordedOn" placeholder="e.g. 1/23/26" />
        </div>
      </div>

      <hr class="section-divider" />

      <div class="owed-header">
        <span>Debtors (owed)</span>
        <button class="btn btn-neutral btn-xs" id="btnAddDebtor">+ Add</button>
      </div>
      <div class="owed-list" id="owedList"></div>
      <div class="owed-empty" id="owedEmpty" style="display:none">No debtors — add one above.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btnModalCancel">Cancel</button>
      <button class="btn btn-primary" id="btnModalSave">Save Expense</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Delete Expense</h3>
    <p id="confirmMsg">Are you sure you want to delete this expense?</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" id="btnConfirmNo">Cancel</button>
      <button class="btn btn-danger" id="btnConfirmYes">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  const state = {
    people: [],
    expenses: [],
    editingIndex: null, // null = closed, -1 = new, >= 0 = editing
  };

  // ── DOM refs ──────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const peopleList    = $('peopleList');
  const expenseBody   = $('expenseBody');
  const tableCount    = $('tableCount');
  const emptyState    = $('emptyState');
  const modalOverlay  = $('modalOverlay');
  const confirmOverlay= $('confirmOverlay');
  const toast         = $('toast');

  // ── People ─────────────────────────────────────────────
  function extractPeopleFromExpenses(expenses) {
    const found = new Set(state.people);
    for (const e of expenses) {
      if (e.paid_by) found.add(e.paid_by.trim());
      for (const d of (e.owed || [])) {
        if (d.debtor) found.add(d.debtor.trim());
      }
    }
    return [...found].sort();
  }

  function renderPeople() {
    peopleList.innerHTML = '';
    for (const p of state.people) {
      const chip = document.createElement('span');
      chip.className = 'person-chip';
      chip.innerHTML = `${escHtml(p)}<button class="person-chip-remove" title="Remove ${escHtml(p)}">×</button>`;
      chip.querySelector('button').addEventListener('click', () => removePerson(p));
      peopleList.appendChild(chip);
    }
  }

  function addPerson(name) {
    name = name.trim();
    if (!name) return;
    if (state.people.includes(name)) { showToast(`"${name}" already in list`); return; }
    state.people.push(name);
    state.people.sort();
    renderPeople();
  }

  function removePerson(name) {
    state.people = state.people.filter(p => p !== name);
    renderPeople();
  }

  $('btnAddPerson').addEventListener('click', () => {
    const input = $('newPersonInput');
    addPerson(input.value);
    input.value = '';
    input.focus();
  });
  $('newPersonInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('btnAddPerson').click();
  });

  // ── Table ──────────────────────────────────────────────
  function renderTable() {
    const count = state.expenses.length;
    tableCount.textContent = `${count} expense${count !== 1 ? 's' : ''}`;
    emptyState.style.display = count === 0 ? 'block' : 'none';
    $('expenseTable').style.display = count === 0 ? 'none' : '';

    expenseBody.innerHTML = '';
    state.expenses.forEach((exp, i) => {
      const tr = document.createElement('tr');
      const debtorSummary = (exp.owed || [])
        .map(d => `${escHtml(d.debtor)} $${d.amount.toFixed(2)}`)
        .join(', ');

      tr.innerHTML = `
        <td class="td-muted">${i + 1}</td>
        <td title="${escHtml(exp.title)}">${escHtml(truncate(exp.title, 32))}</td>
        <td><span class="badge badge-person">${escHtml(exp.paid_by || '—')}</span></td>
        <td class="td-muted">${escHtml(exp.date || '—')}</td>
        <td class="td-muted">${escHtml(exp.rec_amount || '—')}</td>
        <td class="td-num">$${(exp.act_amount || 0).toFixed(2)}</td>
        <td class="td-debtors" title="${escHtml(debtorSummary)}">${escHtml(truncate(debtorSummary, 40)) || '<span style="color:#d1d5db">none</span>'}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-neutral btn-xs btn-edit" data-index="${i}">Edit</button>
            <button class="btn btn-danger btn-xs btn-delete" data-index="${i}">Del</button>
          </div>
        </td>
      `;
      expenseBody.appendChild(tr);
    });

    expenseBody.querySelectorAll('.btn-edit').forEach(btn =>
      btn.addEventListener('click', () => openModal(parseInt(btn.dataset.index)))
    );
    expenseBody.querySelectorAll('.btn-delete').forEach(btn =>
      btn.addEventListener('click', () => confirmDelete(parseInt(btn.dataset.index)))
    );
  }

  // ── Modal ──────────────────────────────────────────────
  function buildPersonSelect(selectedValue) {
    const sel = document.createElement('select');
    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = '— select person —';
    sel.appendChild(placeholder);
    for (const p of state.people) {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      if (p === selectedValue) opt.selected = true;
      sel.appendChild(opt);
    }
    // If selectedValue isn't in the list, add it as a disabled warning option
    if (selectedValue && !state.people.includes(selectedValue)) {
      const opt = document.createElement('option');
      opt.value = selectedValue;
      opt.textContent = `${selectedValue} (not in list)`;
      opt.selected = true;
      sel.insertBefore(opt, sel.children[1]);
    }
    return sel;
  }

  function populatePaidBySelect(selectedValue) {
    const sel = $('fPaidBy');
    sel.innerHTML = '';
    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = '— select person —';
    sel.appendChild(placeholder);
    for (const p of state.people) {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      if (p === selectedValue) opt.selected = true;
      sel.appendChild(opt);
    }
    if (selectedValue && !state.people.includes(selectedValue)) {
      const opt = document.createElement('option');
      opt.value = selectedValue;
      opt.textContent = `${selectedValue} (not in list)`;
      opt.selected = true;
      sel.insertBefore(opt, sel.children[1]);
    }
  }

  function addOwedRow(debtor = '', amount = '') {
    const owedList = $('owedList');
    $('owedEmpty').style.display = 'none';

    const row = document.createElement('div');
    row.className = 'owed-row';

    const sel = buildPersonSelect(debtor);
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.step = '0.01';
    inp.placeholder = '0.00';
    inp.value = amount !== '' ? amount : '';

    const removeBtn = document.createElement('button');
    removeBtn.className = 'owed-row-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove debtor';
    removeBtn.addEventListener('click', () => {
      row.remove();
      if ($('owedList').children.length === 0) $('owedEmpty').style.display = 'block';
    });

    row.appendChild(sel);
    row.appendChild(inp);
    row.appendChild(removeBtn);
    owedList.appendChild(row);
  }

  function openModal(index) {
    state.editingIndex = index;
    const isNew = index === -1;
    $('modalTitle').textContent = isNew ? 'Add Expense' : 'Edit Expense';

    const exp = isNew ? {} : state.expenses[index];

    $('fTitle').value      = exp.title || '';
    $('fRecAmount').value  = exp.rec_amount || '';
    $('fActAmount').value  = exp.act_amount != null ? exp.act_amount : '';
    $('fDate').value       = exp.date || '–';
    $('fRecordedOn').value = exp.recorded_on || '';
    populatePaidBySelect(exp.paid_by || '');

    // Owed rows
    const owedList = $('owedList');
    owedList.innerHTML = '';
    const owed = exp.owed || [];
    if (owed.length === 0) {
      $('owedEmpty').style.display = 'block';
    } else {
      $('owedEmpty').style.display = 'none';
      for (const d of owed) addOwedRow(d.debtor, d.amount);
    }

    modalOverlay.classList.add('open');
    $('fTitle').focus();
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    state.editingIndex = null;
  }

  function saveExpense() {
    const title = $('fTitle').value.trim();
    if (!title) { $('fTitle').focus(); showToast('Title is required'); return; }

    const paid_by = $('fPaidBy').value;
    if (!paid_by) { $('fPaidBy').focus(); showToast('Paid By is required'); return; }

    const owed = [];
    for (const row of $('owedList').children) {
      const debtor = row.querySelector('select').value;
      const amount = parseFloat(row.querySelector('input').value);
      if (!debtor) { showToast('Each debtor row needs a person selected'); return; }
      if (isNaN(amount)) { showToast('Each debtor row needs a valid amount'); return; }
      owed.push({ debtor, amount: Math.round(amount * 100) / 100 });
    }

    const exp = {
      title,
      rec_amount: $('fRecAmount').value.trim(),
      paid_by,
      date: $('fDate').value.trim() || '–',
      recorded_on: $('fRecordedOn').value.trim(),
      act_amount: parseFloat($('fActAmount').value) || 0,
      owed,
    };

    if (state.editingIndex === -1) {
      state.expenses.push(exp);
      showToast('Expense added');
    } else {
      state.expenses[state.editingIndex] = exp;
      showToast('Expense saved');
    }

    closeModal();
    renderTable();
  }

  $('btnAddDebtor').addEventListener('click', () => addOwedRow());
  $('btnAddExpense').addEventListener('click', () => openModal(-1));
  $('btnModalCancel').addEventListener('click', closeModal);
  $('btnModalSave').addEventListener('click', saveExpense);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (modalOverlay.classList.contains('open')) closeModal();
      if (confirmOverlay.classList.contains('open')) closeConfirm();
    }
  });

  // ── Delete / Confirm ───────────────────────────────────
  let pendingDeleteIndex = null;

  function confirmDelete(index) {
    pendingDeleteIndex = index;
    const exp = state.expenses[index];
    $('confirmMsg').textContent =
      `Delete "${exp.title}"? This cannot be undone.`;
    confirmOverlay.classList.add('open');
  }

  function closeConfirm() {
    confirmOverlay.classList.remove('open');
    pendingDeleteIndex = null;
  }

  $('btnConfirmNo').addEventListener('click', closeConfirm);
  $('btnConfirmYes').addEventListener('click', () => {
    if (pendingDeleteIndex !== null) {
      state.expenses.splice(pendingDeleteIndex, 1);
      showToast('Expense deleted');
      renderTable();
    }
    closeConfirm();
  });
  confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) closeConfirm(); });

  // ── Load / Save JSON ───────────────────────────────────
  $('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error('Expected a JSON array');
        state.expenses = data;
        state.people = extractPeopleFromExpenses(data);
        renderPeople();
        renderTable();
        showToast(`Loaded ${data.length} expenses`);
      } catch (err) {
        showToast('Error: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = ''; // allow re-loading same file
  });

  $('btnSave').addEventListener('click', () => {
    const json = JSON.stringify(state.expenses, null, 4);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'expenses.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('expenses.json downloaded');
  });

  // ── Utilities ──────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function truncate(str, len) {
    if (!str) return '';
    return str.length > len ? str.slice(0, len) + '…' : str;
  }

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ── Init ───────────────────────────────────────────────
  renderPeople();
  renderTable();
</script>
</body>
</html>
